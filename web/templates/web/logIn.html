{% extends 'web/index.html' %}
{% block contenido %}

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<div style="max-width: 420px; margin: 40px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
    <h2 style="font-family: 'Tomorrow', sans-serif; font-size: 22px; margin-bottom: 20px; color: #0d1527; text-align: center;">Iniciar Sesión</h2>

    <form id="loginForm" method="POST" action="{% url 'login' %}" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label style="display: block; font-size: 13px; color: #64748b; margin-bottom: 5px; font-weight: 500;">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}

        <button type="submit" style="background: #2563eb; color: white; border: none; padding: 12px; border-radius: 20px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px;">Entrar</button>
    </form>
</div>

<style>
    form input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
    form input:focus { border-color: #2563eb; }
</style>

<script>
// 1. Mostrar alerta de carga al enviar el formulario
document.getElementById('loginForm').addEventListener('submit', function() {
    // No usamos e.preventDefault() para que Django sí reciba los datos y cree la sesión
    Swal.fire({
        title: 'Verificando credenciales...',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });
});
</script>

{% if messages %}
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            {% for message in messages %}
                {% if message.tags == 'error' %}
                    Swal.fire({
                        title: 'Error de Autenticación',
                        text: '{{ message }}',
                        icon: 'error',
                        confirmButtonColor: '#2563eb'
                    });
                {% endif %}
            {% endfor %}
        });
    </script>
{% endif %}

{% endblock %}
