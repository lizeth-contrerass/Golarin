{% extends 'web/index.html' %}
{% block contenido %}
     {% if messages %}
        {% for message in messages %}
            <div style="padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px;
                {% if message.tags == 'success' %} background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc;
                {% elif message.tags == 'error' %} background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7;
                {% else %} background-color: #cff4fc; color: #055160; border: 1px solid #b6effb; {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
<div style="max-width: 420px; margin: 40px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
    <h2 style="font-family: 'Tomorrow', sans-serif; font-size: 22px; margin-bottom: 20px; color: #0d1527; text-align: center;">Iniciar Sesión</h2>

    <form method="POST" action="{% url 'login' %}" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label style="display: block; font-size: 13px; color: #64748b; margin-bottom: 5px; font-weight: 500;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <span style="color: #ef4444; font-size: 11px;">{{ field.errors.0 }}</span>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" style="background: #2563eb; color: white; border: none; padding: 12px; border-radius: 20px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px;">Entrar</button>
    </form>
</div>

<style>
    form input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
    form input:focus { border-color: #2563eb; }
</style>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const response = await fetch('/api/usuarios/login/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ username, password })
    });

    if (response.ok) {
        const data = await response.json();
        // Guardas el JWT en el almacenamiento del navegador
        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);
        alert("Login exitoso");
        // Redirigir a la página principal del dashboard
        window.location.href = '/';
    } else {
        alert("Credenciales incorrectas");
    }
});
</script>
</div>
{% endblock %}
